# ##| | | | | | | |   | ' / ##
# ##| |_| | |_| | |___| . \ ##
# ##|____/ \___/ \____|_|\_\##
# ############################
exec-once = sleep 10 && nwg-dock-hyprland -x -p "left"  -i 24 -mt 10 -mb 10 -ml 5 -f
bind = ALT SHIFT , H , exec, ~/.config/hypr/brain/scripts/nwg_dock_toggle.sh
layerrule = match:class gtk-layer-shell, blur on
layerrule = match:class gtk-layer-shell, ignore_alpha 0.5
layerrule = match:class nwg-dock, blur on
# Other layer rules
layerrule = match:class ~nwgbar, blur yes
layerrule = match:class ~nwgbar, dim_around off


