# Include some common network drivers in the initramfs, as even if we use "fallback-style", not all network drivers are included as they are not typically needed to boot up the system
MODULES=(button ipmi-msghandler ipmi-poweroff nvme virtio virtio-blk virtio-net virtio-pci virtio-ring virtio_scsi xen-blkfront xen-netfront xen-pcifront xen-privcmd ixgbevf ena gve vmxnet3)

# Core virtio stack (paravirtual devices used by QEMU/KVM and many clouds)
MODULES+=(
  virtio virtio_pci virtio_ring
  virtio_net       # network
  virtio_blk       # if using virtio-blk for disks
  virtio_scsi      # if using virtio-scsi instead
)

# QEMU legacy NICs (handy when you switch -device)
MODULES+=(
  e1000 e1000e     # Intel E1000/E1000e
  rtl8139          # Realtek 8139
  pcnet32          # AMD PCNet
)

# VMWare
MODULES+=(vmxnet3)

# Common laptop wired NICs (Intel + Realtek)
MODULES+=(
  e1000e           # very common Intel GbE on laptops
  igc              # Intel I225/I226 2.5GbE
  r8169            # Realtek PCIe GbE (most Realtek wired)
)

# Google Cloud (gVNIC) + fallback virtio
MODULES+=(
  gve              # Google gVNIC
)

# AWS networking
MODULES+=(
  ena              # ENA (Nitro)
  ixgbevf          # legacy SR-IOV VF (Intel 82599/X540/X550/etc.)
)

# Oracle Cloud: paravirtual + SR-IOV (vendor VFs)
MODULES+=(
  # Paravirtual uses virtio_net already
  ixgbevf          # Intel VF path
  mlx5_core        # Mellanox/NVIDIA ConnectX VF path
)

BINARIES=()
FILES=()
HOOKS=(base udev microcode modconf kms keyboard keymap consolefont block btrfs run-once filesystems fsck)
COMPRESSION="xz"
COMPRESSION_OPTIONS=("-T1" "-9v")
